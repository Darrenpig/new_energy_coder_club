version: 1
schema: new-here-wegt

tools:
  - id: screentogif
    name: ScreenToGif
    category: writing
    license: open-source
    open_source: true
    size_hint: small
    description: GIF 录屏工具
    install:
      mode: download
      windows:
        url: https://github.com/NickeManarin/ScreenToGif/releases/latest/download/ScreenToGif.exe
        checksum: sha256:unset

  - id: bambu-studio
    name: Bambu Studio
    category: maker
    license: open-source
    open_source: true
    size_hint: medium
    description: 3D 打印切片软件（BambuLab）
    install:
      mode: download
      windows:
        url: https://github.com/bambulab/BambuStudio/releases/latest/download/BambuStudio_Windows.exe
        checksum: sha256:unset

  - id: clion
    name: CLion
    category: dev
    license: commercial
    open_source: false
    size_hint: large
    description: JetBrains C/C++ IDE（仅跳转官网）
    install:
      mode: redirect
      windows:
        url: https://www.jetbrains.com/clion/

  - id: baidu-netdisk
    name: 百度网盘
    category: network
    license: non-commercial
    open_source: false
    size_hint: large
    description: 非开源下载工具（仅跳转官网）
    install:
      mode: redirect
      windows:
        url: https://pan.baidu.com/download

  - id: steam-accelerator-watt-toolkit
    name: STEAM加速器（Watt Toolkit / Steam++）
    category: network
    license: open-source
    open_source: true
    supports: [windows]
    fetch:
      source: github_release
      repo: BeyondDimension/SteamTools
      version: latest
      asset_match:
        windows:
          x64:
            include: ["Windows","x64"]
            exclude: ["arm","sha","sig","symbols"]
      priority_ext: ["zip","7z","exe","msi"]
    install:
      mode: download
    install_steps:
      windows:
        - type: ensure_dir
          path: "${APP_DIR}\\WattToolkit"
        - type: extract
          from: "${DOWNLOADED_FILE}"
          to: "${APP_DIR}\\WattToolkit"
        - type: shortcut
          target: "${APP_DIR}\\WattToolkit\\WattToolkit.exe"
          where: "startmenu"

  - id: clash-mihomo-core
    name: Clash 内核（mihomo）
    category: network
    license: open-source
    open_source: true
    supports: [windows, linux, macos]
    fetch:
      source: github_release
      repo: MetaCubeX/mihomo
      version: latest
      asset_match:
        windows:
          x64:
            include: ["windows","amd64"]
            exclude: ["arm64","deb","rpm","sha","sig"]
          arm64:
            include: ["windows","arm64"]
            exclude: ["sha","sig","deb","rpm"]
      priority_ext: ["exe","zip","tar.gz"]
    install:
      mode: download
    install_steps:
      windows:
        - type: ensure_dir
          path: "${BIN_DIR}\\mihomo"
        - type: move
          from: "${DOWNLOADED_FILE}"
          to: "${BIN_DIR}\\mihomo\\mihomo.exe"

  - id: clash-verge-rev
    name: Clash Verge Rev
    category: network
    license: open-source
    open_source: true
    supports: [windows, linux, macos]
    fetch:
      source: github_release
      repo: Clash-Verge-rev/clash-verge-rev
      version: latest
      asset_match:
        windows:
          x64:
            include: ["windows","x64"]
            exclude: ["arm64","sha","sig",".blockmap"]
      priority_ext: ["msi","exe","zip"]
    install:
      mode: download
